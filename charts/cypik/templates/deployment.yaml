{{- $root := . }}
{{- $isMulti := gt (len .Values.applications) 0 }}
{{- $apps := .Values.applications }}
{{- if not $isMulti }}
{{- $apps = list (dict "name" (include "cypik.name" .) "fullname" (include "cypik.fullname" .) "replicaCount" .Values.replicaCount "image" .Values.image "deployment" .Values.deployment "autoscaling" .Values.autoscaling "keda" .Values.keda "command" .Values.command "args" .Values.args "securityContext" .Values.securityContext "lifecycle" .Values.lifecycle "containerPorts" .Values.containerPorts "env" .Values.env "envFrom" .Values.envFrom "probes" .Values.probes "resources" .Values.resources "volumeMounts" .Values.volumeMounts "volumes" .Values.volumes "sidecars" .Values.sidecars "initContainers" .Values.initContainers "podSecurityContext" .Values.podSecurityContext "priorityClassName" .Values.priorityClassName "hostAliases" .Values.hostAliases "nodeSelector" .Values.nodeSelector "affinity" .Values.affinity "topologySpreadConstraints" .Values.topologySpreadConstraints "tolerations" .Values.tolerations "persistence" .Values.persistence) }}
{{- end }}
{{- range $apps }}
{{- $app := . }}
{{- $appName := required "applications[].name is required" $app.name }}
{{- $fullName := default (printf "%s-%s" (include "cypik.fullname" $root) $appName | trunc 63 | trimSuffix "-") $app.fullname }}
{{- $image := default dict $app.image }}
{{- $imageRepo := required (printf "applications[%s].image.repository is required" $appName) (default $root.Values.image.repository $image.repository) }}
{{- $imageTag := default (default $root.Chart.AppVersion $root.Values.image.tag) $image.tag }}
{{- $deployment := default dict $app.deployment }}
{{- $deploymentEnabled := true -}}
{{- if hasKey $deployment "enabled" -}}
  {{- $deploymentEnabled = $deployment.enabled -}}
{{- end -}}
{{- $autoscaling := default dict $app.autoscaling }}
{{- $keda := default dict $app.keda }}
{{- $probes := default dict $app.probes }}
{{- $persistence := default dict $app.persistence }}
{{- $persistenceMountPath := default $root.Values.persistence.mountPath $persistence.mountPath }}
{{- if $deploymentEnabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "cypik.labels" $root | nindent 4 }}
    {{- if $isMulti }}
    app.kubernetes.io/component: {{ $appName }}
    {{- end }}
  {{- with $deployment.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if not (or (default false $autoscaling.enabled) (default false $keda.enabled)) }}
  replicas: {{ default 1 $app.replicaCount }}
  {{- end }}
  revisionHistoryLimit: {{ default 10 $deployment.revisionHistoryLimit }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "cypik.name" $root }}
      app.kubernetes.io/instance: {{ $root.Release.Name }}
      {{- if $isMulti }}
      app.kubernetes.io/component: {{ $appName }}
      {{- end }}
  strategy:
    {{- toYaml (default (dict "type" "RollingUpdate") $deployment.strategy) | nindent 4 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "cypik.name" $root }}
        app.kubernetes.io/instance: {{ $root.Release.Name }}
        {{- if $isMulti }}
        app.kubernetes.io/component: {{ $appName }}
        {{- end }}
        {{- with $deployment.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with $deployment.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "cypik.serviceAccountName" $root }}
      {{- with $app.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- with (default $root.Values.imagePullSecrets $app.imagePullSecrets) }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $app.hostAliases }}
      hostAliases:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $app.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $app.initContainers }}
      initContainers:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ $appName }}
          image: {{ printf "%s:%s" $imageRepo $imageTag | quote }}
          imagePullPolicy: {{ default $root.Values.image.pullPolicy $image.pullPolicy }}
          {{- with $app.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $app.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $app.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $app.lifecycle }}
          lifecycle:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with (default $root.Values.containerPorts $app.containerPorts) }}
          ports:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $app.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if or $app.envFrom (and (not $isMulti) $root.Values.config.enabled) (and (not $isMulti) $root.Values.secret.enabled) }}
          envFrom:
            {{- if and (not $isMulti) $root.Values.config.enabled }}
            - configMapRef:
                name: {{ include "cypik.fullname" $root }}
            {{- end }}
            {{- if and (not $isMulti) $root.Values.secret.enabled }}
            - secretRef:
                name: {{ include "cypik.fullname" $root }}
            {{- end }}
            {{- with $app.envFrom }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          {{- with $probes.liveness }}
          {{- if .enabled }}
          livenessProbe:
            {{- omit . "enabled" | toYaml | nindent 12 }}
          {{- end }}
          {{- end }}
          {{- with $probes.readiness }}
          {{- if .enabled }}
          readinessProbe:
            {{- omit . "enabled" | toYaml | nindent 12 }}
          {{- end }}
          {{- end }}
          {{- with $probes.startup }}
          {{- if .enabled }}
          startupProbe:
            {{- omit . "enabled" | toYaml | nindent 12 }}
          {{- end }}
          {{- end }}
          {{- with $app.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if or (default false $persistence.enabled) $app.volumeMounts }}
          volumeMounts:
            {{- if default false $persistence.enabled }}
            - name: data
              mountPath: {{ $persistenceMountPath }}
            {{- end }}
            {{- with $app.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
        {{- with $app.sidecars }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- if or (default false $persistence.enabled) $app.volumes }}
      volumes:
        {{- if default false $persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ $fullName }}
        {{- end }}
        {{- with $app.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      {{- with $app.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $app.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $app.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $app.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
{{- end }}
