{{- if and .Values.autoscaling.enabled .Values.keda.enabled }}
{{- fail "autoscaling.enabled and keda.enabled cannot both be true. Use either standard HPA or KEDA ScaledObject." }}
{{- end }}
{{- if and .Values.autoscaling.enabled (not .Values.deployment.enabled) }}
{{- fail "autoscaling.enabled requires deployment.enabled=true." }}
{{- end }}
{{- if and .Values.autoscaling.enabled (not (or .Values.autoscaling.targetCPUUtilizationPercentage .Values.autoscaling.targetMemoryUtilizationPercentage)) }}
{{- fail "autoscaling requires at least one metric: targetCPUUtilizationPercentage or targetMemoryUtilizationPercentage." }}
{{- end }}
{{- if and .Values.keda.enabled (not .Values.keda.triggers) }}
{{- fail "keda.triggers must contain at least one trigger when keda.enabled is true." }}
{{- end }}
{{- if and .Values.keda.enabled (not .Values.deployment.enabled) }}
{{- fail "keda.enabled requires deployment.enabled=true." }}
{{- end }}
{{- if .Values.storageClass.enabled }}
{{- $_ := required "storageClass.name is required when storageClass.enabled=true" .Values.storageClass.name }}
{{- $_ := required "storageClass.provisioner is required when storageClass.enabled=true" .Values.storageClass.provisioner }}
{{- end }}
{{- range .Values.applications }}
{{- $appName := .name }}
{{- $autoscaling := default dict .autoscaling }}
{{- $keda := default dict .keda }}
{{- $deployment := default dict .deployment }}
{{- if and $autoscaling.enabled $keda.enabled }}
{{- fail (printf "applications[%s].autoscaling.enabled and applications[%s].keda.enabled cannot both be true" $appName $appName) }}
{{- end }}
{{- if and $autoscaling.enabled (eq $deployment.enabled false) }}
{{- fail (printf "applications[%s].autoscaling.enabled requires deployment.enabled=true" $appName) }}
{{- end }}
{{- if and $keda.enabled (eq $deployment.enabled false) }}
{{- fail (printf "applications[%s].keda.enabled requires deployment.enabled=true" $appName) }}
{{- end }}
{{- $service := default dict .service }}
{{- $ingress := default dict .ingress }}
{{- if and $ingress.enabled (not $service.enabled) }}
{{- fail (printf "applications[%s].ingress.enabled requires service.enabled=true" $appName) }}
{{- end }}
{{- if $ingress.enabled }}
{{- $servicePorts := default (list (dict "name" "http" "port" 80 "targetPort" "http" "protocol" "TCP")) $service.ports }}
{{- range $host := $ingress.hosts }}
{{- range $path := $host.paths }}
{{- $servicePort := required (printf "applications[%s].ingress.hosts[].paths[].servicePort is required" $appName) $path.servicePort }}
{{- $matched := false }}
{{- range $port := $servicePorts }}
{{- if or (and $port.name (eq (toString $servicePort) (toString $port.name))) (and $port.port (eq (toString $servicePort) (toString $port.port))) }}
{{- $matched = true }}
{{- end }}
{{- end }}
{{- if not $matched }}
{{- fail (printf "applications[%s].ingress servicePort %q must match one of service.ports[].name or service.ports[].port" $appName (toString $servicePort)) }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- range .Values.cronjobs }}
{{- $_ := required "cronjobs[].name is required" .name }}
{{- $_ := required (printf "cronjobs[%s].schedule is required" .name) .schedule }}
{{- end }}
