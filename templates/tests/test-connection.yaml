{{- if and .Values.tests.enabled .Values.service.enabled (not .Values.applications) }}
apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "cypik.fullname" . }}-test-connection"
  labels:
    {{- include "cypik.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox:1.36
      command:
        - wget
      args:
        - "{{ include "cypik.fullname" . }}:{{ (first .Values.service.ports).port }}"
  restartPolicy: Never
{{- end }}
