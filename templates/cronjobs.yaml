{{- range .Values.cronjobs }}
{{- $jobName := required "cronjobs[].name is required" .name }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ printf "%s-%s" (include "cypik.fullname" $) $jobName | trunc 63 | trimSuffix "-" }}
  labels:
    {{- include "cypik.labels" $ | nindent 4 }}
spec:
  schedule: {{ required (printf "cronjobs[%s].schedule is required" $jobName) .schedule | quote }}
  {{- with .timeZone }}
  timeZone: {{ . | quote }}
  {{- end }}
  successfulJobsHistoryLimit: {{ default 3 .successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ default 1 .failedJobsHistoryLimit }}
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            {{- include "cypik.selectorLabels" $ | nindent 12 }}
        spec:
          restartPolicy: {{ default "OnFailure" .restartPolicy }}
          serviceAccountName: {{ include "cypik.serviceAccountName" $ }}
          containers:
            - name: {{ $jobName }}
              {{- $image := .image | default dict }}
              {{- $imageRepo := "" }}
              {{- $imageTag := "" }}
              {{- if kindIs "string" .image }}
                {{- $imageRepo = .image }}
              {{- else }}
                {{- $imageRepo = required (printf "cronjobs[%s].image.repository is required" $jobName) (default $.Values.image.repository .image.repository) }}
                {{- $imageTag = default (default $.Values.image.tag $.Chart.AppVersion) .image.tag }}
              {{- end }}
              image: {{ if kindIs "string" .image }}{{ .image | quote }}{{ else }}{{ printf "%s:%s" $imageRepo $imageTag | quote }}{{ end }}
              imagePullPolicy: {{ default $.Values.image.pullPolicy .imagePullPolicy }}
              {{- with .command }}
              command:
                {{- toYaml . | nindent 16 }}
              {{- end }}
              {{- with .args }}
              args:
                {{- toYaml . | nindent 16 }}
              {{- end }}
              {{- if or .env .envRaw }}
              env:
                {{- with .env }}
                {{- toYaml . | nindent 16 }}
                {{- end }}
                {{- with .envRaw }}
                {{- toYaml . | nindent 16 }}
                {{- end }}
              {{- end }}
              {{- if or $.Values.config.enabled $.Values.secret.enabled .envFrom }}
              envFrom:
                {{- if $.Values.config.enabled }}
                - configMapRef:
                    name: {{ include "cypik.fullname" $ }}
                {{- end }}
                {{- if $.Values.secret.enabled }}
                - secretRef:
                    name: {{ include "cypik.fullname" $ }}
                {{- end }}
                {{- with .envFrom }}
                {{- toYaml . | nindent 16 }}
                {{- end }}
              {{- end }}
{{- end }}
