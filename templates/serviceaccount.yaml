{{- $root := . }}
{{- $isMulti := gt (len .Values.applications) 0 }}
{{- $apps := .Values.applications }}
{{- if not $isMulti }}
{{- $apps = list (dict "name" (include "cypik.name" .) "fullname" (include "cypik.fullname" .) "serviceAccount" .Values.serviceAccount) }}
{{- end }}
{{- range $apps }}
{{- $appName := .name }}
{{- $fullName := default (printf "%s-%s" (include "cypik.fullname" $root) $appName | trunc 63 | trimSuffix "-") .fullname }}
{{- $sa := default dict .serviceAccount }}
{{- if $sa.create }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ default $fullName $sa.name }}
  labels:
    {{- include "cypik.labels" $root | nindent 4 }}
    {{- if $isMulti }}
    app.kubernetes.io/component: {{ $appName }}
    {{- end }}
  {{- with $sa.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ default true $sa.automount }}
{{- end }}
{{- end }}
